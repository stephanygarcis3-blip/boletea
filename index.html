<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Boleto Digital - Jorge Medina y Josi Cuen</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* Top Action Bar */
        .top-bar {
            width: 100%;
            max-width: 380px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            margin-bottom: 10px;
        }
        .top-bar .title {
            font-size: 16px;
            font-weight: 600;
        }
        .btn-download {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(255,255,255,0.1);
        }

        /* Ticket Wrapper */
        .ticket-container {
            width: 100%;
            max-width: 380px;
        }
        
        /* Ticket Layout */
        .ticket-card {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            padding: 24px 20px 30px 20px;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* Top notch simulation */
        .ticket-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 14px;
            background-color: #000000;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
        }

        .ticket-header {
            text-align: right;
            margin-bottom: 5px;
        }
        .order-label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1;
        }
        .order-num {
            font-size: 22px;
            font-weight: 800;
            line-height: 1;
        }
        
        .logo-container {
            text-align: center;
            margin: 10px 0 15px 0;
        }
        .logo-main {
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 52px;
            font-weight: 900;
            font-style: italic;
            color: #d3141e;
            letter-spacing: -2px;
            line-height: 0.9;
        }
        .logo-sub {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 12px;
            text-indent: 12px;
            text-align: center;
            margin-top: -4px;
            text-transform: uppercase;
        }

        .event-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-size: 12px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 12px;
        }
        .info-block {
            flex: 1;
        }
        .info-label {
            font-size: 10px;
            font-weight: bold;
            color: #555555;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .info-value {
            font-size: 11px;
            font-weight: 700;
            line-height: 1.3;
        }
        .text-right {
            text-align: right;
        }

        /* Seating Matrix Grid */
        .seating-grid {
            display: grid;
            grid-template-columns: 1.2fr 1.1fr 0.7fr 1fr;
            gap: 10px;
            margin-bottom: 35px;
        }
        .seat-label {
            font-size: 10px;
            font-weight: bold;
            color: #555555;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .seat-value {
            font-size: 18px;
            font-weight: 700;
        }

        /* NUEVA ESTRATEGIA INMUNE A CORTES */
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            width: 100%;
        }

            width: 150px;
            height: 150px;
